name: flowspot_toilets_water
description: FlowSpot — Toilets & Water, a Flutter app for finding public toilets and drinking fountains.
publish_to: 'none'
version: 0.8.0+8

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  geolocator: ^13.0.1
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.8.0
  image_picker: ^1.1.2
  google_mobile_ads: ^5.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/data/toilettes-publiques-en-ile-de-france.csv
